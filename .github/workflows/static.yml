name: Deploy to GitHub Pages

on:
  # mainへ反映されたらGitHub Pagesへデプロイする。
  push:
    branches: ["main"]
  # 必要に応じてActions画面から手動実行できるようにする。
  workflow_dispatch:

# GitHub Pagesデプロイに必要な最小権限だけを許可する。
permissions:
  contents: read
  pages: write
  id-token: write

# GitHub Pagesへのデプロイが同時に走らないようにする。
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          # Vite 8の要求範囲を満たす現行LTSを使う。
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          # vite buildの出力先をGitHub Pagesへ渡す。
          path: "./dist"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
